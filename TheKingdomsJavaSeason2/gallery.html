<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>TKMY | Galeri Penuh Dunia</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff9900;
            --gold: #ffd700;
            --dark: #050505;
            --border: rgba(255, 153, 0, 0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1a0a2e 0%, #050505 100%);
            color: #fff;
            margin: 0;
            padding: 60px 20px;
            text-align: center;
        }
        h1 { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--gold); 
            letter-spacing: 8px; 
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p { color: #888; margin-bottom: 50px; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery-item {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            aspect-ratio: 16/9;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #000;
        }
        .gallery-item:hover { 
            transform: scale(1.05); 
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(255, 153, 0, 0.2);
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .back-btn {
            display: inline-block;
            margin-top: 60px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--accent);
            padding: 12px 35px;
            border-radius: 50px;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>
    <h1>GALERI DUNIA TKMY</h1>
    <p>Koleksi memori dan keindahan dunia The Kingdoms Malaysia</p>
    <div class="gallery-grid">
        <div class="gallery-item"><img src="../images/world1.jpg" alt="Dunia 1"></div>
        <div class="gallery-item"><img src="../images/world2.jpg" alt="Dunia 2"></div>
        <div class="gallery-item"><img src="../images/header-bg.jpeg" alt="Dunia 3"></div>
        <div class="gallery-item"><img src="../images/server-bg.jpg" alt="Dunia 4"></div>
        <!-- Tambah lagi <div class="gallery-item"><img src="..."></div> untuk gambar seterusnya -->
    </div>
    <a href="index.html" class="back-btn">← Kembali ke Pengumuman</a>
</body>
</html>
